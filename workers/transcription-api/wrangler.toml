name = "lexena-transcription-api"
main = "src/index.ts"
compatibility_date = "2026-05-05"
compatibility_flags = ["nodejs_compat"]

# Production deployment
[env.production]
routes = [
  { pattern = "api.lexena.app/*", zone_name = "lexena.app" }
]

# Secrets are set via `wrangler secret put` — never commit them here.
# Required: SUPABASE_URL, SUPABASE_SECRET_KEY, GROQ_API_KEY, OPENAI_API_KEY
# (SUPABASE_SECRET_KEY = the new "Secret key" sb_secret_..., NOT the legacy service_role)
# JWT verification fetches the public key from Supabase's JWKS endpoint
# (<SUPABASE_URL>/auth/v1/.well-known/jwks.json) — no shared secret needed.
