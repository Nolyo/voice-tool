  <!-- Em-dash -->
  <line x1="15" y1="18" x2="33" y2="18" stroke="#0D1B2A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Wordmark "lexena" -->
  <text
    x="41"
    y="25"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="24"
    font-weight="400"
    letter-spacing="-0.4"
