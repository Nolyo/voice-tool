name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  vitest:
    name: Frontend tests (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  cargo-test:
    name: Rust tests (cargo test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - name: Install build deps (libclang, cmake + tauri linux deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libclang-dev clang cmake \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev \
            libglib2.0-dev pkg-config \
            libasound2-dev libxdo-dev libssl-dev
      - name: cargo test (no-default-features, skip vulkan)
        working-directory: src-tauri
        env:
          CARGO_TARGET_DIR: target
        run: cargo test --no-default-features --lib

  deno-test:
    name: Edge functions tests (Deno)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v1.x
      - name: Run all tests in supabase/functions
        run: deno test --allow-env --allow-net supabase/functions/

  pgtap:
    name: Database tests (pgtap)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local Supabase
        run: supabase start
      - name: Run pgtap suite
        run: supabase test db
      - name: Stop Supabase
        if: always()
        run: supabase stop
