name: Release (local builds)
# Builds are done locally via release.ps1
# This workflow can manually regenerate docs/releases.json if needed.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-releases-json:
    name: Regenerate releases.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        working-directory: .github/scripts
        run: npm install
      - name: Generate releases.json
        working-directory: .github/scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node generate-releases-json.js
      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add docs/releases.json
          git diff --staged --quiet || git commit -m "chore: update releases.json (manual trigger)"
          git push origin main
