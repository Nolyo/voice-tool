name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-update-manifests:
    name: Generate Update Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: .github/scripts
        run: npm install

      - name: Generate update manifests
        working-directory: .github/scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node generate-releases-json.js

      - name: Commit docs/releases.json
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add docs/releases.json
          git diff --staged --quiet || git commit -m "chore: update releases.json for ${{ github.ref_name }}"
          git push origin main

  scan-release-artifacts:
    name: Scan release artifacts for leaked secrets
    runs-on: ubuntu-latest
    needs: [generate-update-manifests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p src-tauri/target/release/bundle
          gh release download ${{ github.ref_name }} --dir src-tauri/target/release/bundle --pattern '*'

      - name: Scan bundles for leaked secrets
        run: node .github/scripts/scan-secrets-in-bundles.mjs
